name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r phase2_haynesville_dca/requirements.txt
          pip install pytest

      - name: Run test suite (19 tests, both phases)
        env:
          PYTHONPATH: .
        run: python -m pytest phase2_haynesville_dca/ -v
